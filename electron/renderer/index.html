<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Jvedio Home MVP Shell</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
        background:
          radial-gradient(circle at top left, #20324b, transparent 32%),
          radial-gradient(circle at top right, #34384c, transparent 30%),
          linear-gradient(135deg, #0f1115, #171b24 48%, #10131a);
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: #eff2f8;
      }

      #app {
        min-height: 100vh;
      }

      .shell {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }

      .sidebar {
        padding: 32px 24px;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(10, 12, 18, 0.58);
        backdrop-filter: blur(16px);
      }

      .brand {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .brand-subtitle {
        margin-top: 8px;
        color: #97a5bf;
        line-height: 1.6;
      }

      .content {
        padding: 48px;
      }

      .panel {
        max-width: 760px;
        padding: 28px;
        border-radius: 20px;
        background: rgba(18, 23, 33, 0.82);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.28);
      }

      .eyebrow {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(71, 151, 255, 0.18);
        color: #93c3ff;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 12px;
        font-size: 36px;
      }

      p {
        margin: 0;
        color: #b7c1d4;
        line-height: 1.7;
      }

      dl {
        display: grid;
        grid-template-columns: 180px 1fr;
        row-gap: 12px;
        margin: 32px 0 0;
      }

      dt {
        color: #8f9db6;
      }

      dd {
        margin: 0;
      }

      .status-ok {
        color: #83f5ab;
      }

      .status-error {
        color: #ff9f9f;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="../dist/renderer/main.js"></script>
  </body>
</html>
