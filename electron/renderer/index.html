<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Jvedio</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Bahnschrift, "Segoe UI Variable", "Microsoft YaHei UI", sans-serif;
        --bg-0: #07121d;
        --bg-1: #0c1b2b;
        --bg-2: #12253c;
        --surface: rgba(10, 20, 34, 0.84);
        --surface-strong: rgba(7, 16, 28, 0.92);
        --surface-soft: rgba(18, 34, 53, 0.78);
        --border: rgba(145, 190, 255, 0.14);
        --text: #edf4ff;
        --text-muted: #90a4c0;
        --accent: #6fd1ff;
        --accent-strong: #22b7ff;
        --danger: #ff7971;
        --success: #7ee2a6;
        background:
          radial-gradient(circle at 12% 18%, rgba(63, 186, 255, 0.18), transparent 28%),
          radial-gradient(circle at 90% 12%, rgba(255, 144, 104, 0.14), transparent 24%),
          radial-gradient(circle at 62% 82%, rgba(147, 118, 255, 0.10), transparent 22%),
          linear-gradient(140deg, var(--bg-0), var(--bg-1) 42%, var(--bg-2));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background: transparent;
      }

      #app {
        min-height: 100vh;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .app-shell {
        display: grid;
        grid-template-columns: 310px minmax(0, 1fr);
        min-height: 100vh;
      }

      .shell-sidebar {
        display: flex;
        flex-direction: column;
        gap: 24px;
        padding: 28px 22px;
        border-right: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(5, 12, 21, 0.88), rgba(8, 16, 27, 0.76));
        backdrop-filter: blur(18px);
      }

      .sidebar-header {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-mark {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 52px;
        height: 52px;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(34, 183, 255, 0.92), rgba(111, 209, 255, 0.24));
        color: #04111c;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .brand-title {
        font-size: 25px;
        font-weight: 700;
        letter-spacing: 0.03em;
      }

      .brand-subtitle {
        margin-top: 6px;
        color: var(--text-muted);
        font-size: 13px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .wide-button {
        width: 100%;
      }

      .primary-nav,
      .nav-section {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .nav-section {
        padding-top: 6px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }

      .nav-section-label,
      .footer-label,
      .note-label,
      .metric-card span,
      .detail-card span,
      .danger-summary span {
        color: var(--text-muted);
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .nav-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid transparent;
        border-radius: 16px;
        color: #d7e4f8;
        background: rgba(255, 255, 255, 0.02);
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .nav-link:hover {
        transform: translateX(2px);
        border-color: rgba(111, 209, 255, 0.24);
      }

      .nav-link.active {
        border-color: rgba(111, 209, 255, 0.38);
        background: linear-gradient(135deg, rgba(34, 183, 255, 0.18), rgba(255, 255, 255, 0.02));
      }

      .nav-link small,
      .metric-card small,
      .library-stat,
      .empty-card p,
      .route-copy,
      .modal-copy,
      .danger-summary,
      .scan-path-panel ul,
      .content-header p,
      .footer-hint {
        color: var(--text-muted);
      }

      .empty-nav {
        padding: 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text-muted);
        line-height: 1.6;
      }

      .sidebar-footer {
        margin-top: auto;
      }

      .footer-card {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid rgba(111, 209, 255, 0.16);
        background: linear-gradient(180deg, rgba(14, 26, 42, 0.95), rgba(9, 17, 29, 0.78));
      }

      .footer-value,
      .note-value {
        margin-top: 8px;
        font-size: 20px;
        font-weight: 700;
      }

      .shell-content {
        padding: 34px 36px 42px;
      }

      .content-header,
      .section-header,
      .modal-header,
      .library-card-head,
      .header-actions,
      .modal-actions,
      .library-card-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .content-header {
        margin-bottom: 24px;
      }

      .content-header h1,
      .section-header h2,
      .modal-header h2,
      .fatal-card h1,
      .loading-card h2 {
        margin: 12px 0 0;
        font-size: clamp(30px, 4vw, 44px);
        line-height: 1.05;
      }

      .section-header h2,
      .modal-header h2,
      .loading-card h2 {
        font-size: 24px;
      }

      .content-header p,
      .route-copy,
      .modal-copy,
      .loading-card p,
      .fatal-card p {
        margin: 14px 0 0;
        max-width: 720px;
        line-height: 1.75;
      }

      .metric-grid,
      .library-detail-grid,
      .danger-summary {
        display: grid;
        gap: 16px;
      }

      .metric-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .metric-card,
      .detail-card {
        padding: 20px 22px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(12, 23, 38, 0.88), rgba(7, 15, 27, 0.88));
        box-shadow: 0 22px 40px rgba(0, 0, 0, 0.22);
      }

      .metric-card strong,
      .detail-card strong {
        display: block;
        margin-top: 16px;
        font-size: 29px;
        letter-spacing: -0.03em;
      }

      .metric-card small {
        display: block;
        margin-top: 12px;
        line-height: 1.6;
      }

      .split-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.5fr) minmax(320px, 0.8fr);
        gap: 20px;
        margin-top: 20px;
      }

      .split-layout.single-column {
        grid-template-columns: minmax(0, 1fr);
      }

      .surface-card,
      .loading-card,
      .fatal-card {
        padding: 24px;
        border-radius: 26px;
        border: 1px solid var(--border);
        background: var(--surface);
        box-shadow: 0 24px 68px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(20px);
      }

      .library-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
        margin-top: 22px;
      }

      .library-card {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 18px;
        min-height: 190px;
        border-radius: 22px;
        border: 1px solid rgba(111, 209, 255, 0.14);
        background: linear-gradient(180deg, rgba(13, 24, 39, 0.96), rgba(11, 19, 32, 0.82));
      }

      .task-card {
        display: grid;
        gap: 12px;
        padding: 16px 18px;
        border-radius: 20px;
        border: 1px solid rgba(111, 209, 255, 0.14);
        background: linear-gradient(180deg, rgba(13, 24, 39, 0.96), rgba(11, 19, 32, 0.82));
      }

      .task-card.failed {
        border-color: rgba(255, 121, 113, 0.24);
        background: linear-gradient(180deg, rgba(40, 16, 21, 0.96), rgba(20, 11, 18, 0.9));
      }

      .task-card-head,
      .task-card-actions,
      .task-card-meta,
      .task-detail-status-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .task-card-head {
        justify-content: space-between;
      }

      .task-card-head strong,
      .task-card-title {
        font-weight: 700;
      }

      .task-card-title {
        font-size: 18px;
        letter-spacing: -0.01em;
      }

      .task-card-summary {
        line-height: 1.7;
      }

      .task-card-meta,
      .task-card-time {
        color: var(--text-muted);
        font-size: 13px;
      }

      .task-card-actions {
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }

      .task-card-actions .primary-button,
      .task-card-actions .ghost-button {
        flex: 1 1 140px;
      }

      .task-error,
      .task-detail-error-block {
        padding: 14px 16px;
        border-radius: 18px;
        border: 1px solid rgba(255, 121, 113, 0.22);
        background: rgba(255, 121, 113, 0.1);
        color: #ffc2bc;
      }

      .task-error {
        line-height: 1.65;
      }

      .task-detail-card {
        width: min(760px, 100%);
        display: grid;
        gap: 18px;
        max-height: calc(100vh - 48px);
        overflow: auto;
      }

      .task-detail-status-row {
        margin-top: -2px;
      }

      .task-detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
      }

      .task-detail-error-block {
        display: grid;
        gap: 10px;
      }

      .task-detail-error-block strong {
        color: inherit;
        line-height: 1.7;
      }

      .library-title {
        font-size: 23px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .library-stat {
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 0.12em;
      }

      .path-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .path-badge {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        color: #b6cae7;
        font-size: 12px;
        line-height: 1.3;
        word-break: break-all;
      }

      .muted-badge {
        color: #8498b5;
      }

      .ghost-link {
        color: var(--accent);
      }

      .side-stack {
        display: flex;
        flex-direction: column;
      }

      .task-list {
        display: grid;
        gap: 12px;
        margin-top: 20px;
      }

      .collection-summary-strip,
      .collection-summary-pills {
        display: flex;
        gap: 12px;
      }

      .collection-summary-strip {
        align-items: flex-start;
        justify-content: space-between;
        flex-wrap: wrap;
        margin-top: 18px;
        padding: 18px;
        border-radius: 18px;
        border: 1px solid rgba(111, 209, 255, 0.12);
        background: rgba(255, 255, 255, 0.03);
      }

      .collection-summary-strip.compact-strip {
        margin-top: 20px;
      }

      .collection-summary-copy {
        display: grid;
        gap: 8px;
        max-width: 520px;
      }

      .collection-summary-title {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .collection-summary-pills {
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      .summary-pill {
        display: inline-flex;
        align-items: center;
        min-height: 36px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: #dbe9fb;
        font-size: 13px;
      }

      .summary-link-pill {
        color: var(--accent);
        border: 1px solid rgba(111, 209, 255, 0.16);
      }

      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .task-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border-radius: 16px;
        background: var(--surface-soft);
      }

      .worker-note,
      .scan-path-panel,
      .empty-card {
        margin-top: 18px;
        padding: 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
      }

      .empty-card h3 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      .status-ok {
        color: var(--success);
      }

      .status-error {
        color: var(--danger);
      }

      .page-banner,
      .inline-error {
        margin-bottom: 18px;
        padding: 14px 16px;
        border-radius: 16px;
        line-height: 1.6;
      }

      .page-banner {
        margin-top: -6px;
      }

      .global-activity-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin: -2px 0 18px;
        padding: 18px 20px;
        border-radius: 22px;
        border: 1px solid rgba(111, 209, 255, 0.18);
        background: linear-gradient(135deg, rgba(16, 34, 56, 0.94), rgba(8, 18, 30, 0.88));
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.2);
      }

      .global-activity-bar.failed {
        border-color: rgba(255, 121, 113, 0.24);
        background: linear-gradient(135deg, rgba(55, 18, 24, 0.94), rgba(18, 10, 17, 0.9));
      }

      .global-activity-copy,
      .global-activity-actions,
      .global-activity-meta,
      .global-activity-summary-grid {
        display: flex;
        gap: 12px;
      }

      .global-activity-copy {
        flex: 1 1 auto;
        align-items: flex-start;
        justify-content: space-between;
      }

      .global-activity-copy h2 {
        margin: 10px 0 0;
        font-size: 24px;
        line-height: 1.1;
      }

      .global-activity-copy p {
        margin: 10px 0 0;
        color: var(--text-muted);
        line-height: 1.7;
      }

      .global-activity-meta {
        flex-wrap: wrap;
        justify-content: flex-end;
        margin-left: 16px;
      }

      .activity-pill {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: #d7e4f8;
        font-size: 13px;
      }

      .global-activity-actions {
        flex: 0 0 auto;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .global-activity-summary-grid {
        color: var(--text-muted);
        font-size: 13px;
        flex-wrap: wrap;
      }

      .error-banner,
      .inline-error {
        background: rgba(255, 121, 113, 0.14);
        border: 1px solid rgba(255, 121, 113, 0.24);
        color: #ffc2bc;
      }

      .info-banner {
        background: rgba(111, 209, 255, 0.12);
        border: 1px solid rgba(111, 209, 255, 0.22);
        color: #c7efff;
      }

      .warning-banner {
        background: rgba(255, 193, 94, 0.12);
        border: 1px solid rgba(255, 193, 94, 0.24);
        color: #ffd89a;
      }

      .result-pagination,
      .pagination-actions {
        display: flex;
        align-items: center;
      }

      .result-pagination {
        justify-content: space-between;
        gap: 16px;
        margin-top: 18px;
        padding: 14px 16px;
        border: 1px solid rgba(111, 209, 255, 0.12);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
      }

      .pagination-summary {
        color: var(--text-muted);
        line-height: 1.6;
      }

      .pagination-actions {
        justify-content: flex-end;
        gap: 12px;
      }

      .primary-button,
      .ghost-button,
      .danger-button,
      .icon-button {
        border: none;
        cursor: pointer;
        transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
      }

      .primary-button,
      .ghost-button,
      .danger-button {
        padding: 12px 18px;
        border-radius: 16px;
        font-weight: 700;
      }

      .primary-button {
        background: linear-gradient(135deg, var(--accent-strong), var(--accent));
        color: #03121d;
      }

      .ghost-button {
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
      }

      .danger-button {
        background: linear-gradient(135deg, rgba(255, 121, 113, 0.94), rgba(255, 165, 142, 0.9));
        color: #250503;
      }

      .icon-button {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font-size: 22px;
        line-height: 1;
      }

      .primary-button:hover,
      .ghost-button:hover,
      .danger-button:hover,
      .icon-button:hover {
        transform: translateY(-1px);
      }

      .primary-button:disabled,
      .ghost-button:disabled,
      .danger-button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        transform: none;
      }

      .modal-shell {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(3, 7, 12, 0.62);
        backdrop-filter: blur(10px);
      }

      .modal-card {
        width: min(620px, 100%);
        padding: 24px;
        border-radius: 26px;
        border: 1px solid var(--border);
        background: var(--surface-strong);
        box-shadow: 0 32px 70px rgba(0, 0, 0, 0.4);
      }

      .danger-card {
        border-color: rgba(255, 121, 113, 0.24);
      }

      .danger-eyebrow {
        background: rgba(255, 121, 113, 0.16);
        color: #ffb8b3;
      }

      .modal-form {
        display: grid;
        gap: 16px;
        margin-top: 18px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field span {
        color: var(--text-muted);
        font-size: 13px;
      }

      .field input,
      .field textarea {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid rgba(111, 209, 255, 0.18);
        border-radius: 16px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.03);
        resize: vertical;
      }

      .danger-summary {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 18px;
      }

      .danger-summary div {
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
      }

      .danger-summary strong {
        display: block;
        margin-top: 8px;
      }

      .library-detail-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        margin-top: 20px;
      }

      .scan-path-panel ul {
        margin: 14px 0 0;
        padding-left: 18px;
        line-height: 1.8;
      }

      .scan-path-title {
        font-size: 14px;
        font-weight: 700;
      }

      .filter-toolbar,
      .badge-row,
      .action-column,
      .actor-pill-list,
      .video-result-meta,
      .video-detail-list {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .filter-toolbar,
      .video-result-grid,
      .video-detail-list {
        margin-top: 18px;
      }

      .section-meta,
      .inline-note,
      .task-chip,
      .field-label {
        color: var(--text-muted);
      }

      .field-label {
        display: inline-block;
        margin-bottom: 8px;
        font-size: 13px;
      }

      .scan-path-editor {
        margin-top: 18px;
      }

      .scan-path-textarea {
        width: 100%;
        min-height: 120px;
        padding: 14px 16px;
        resize: vertical;
      }

      .task-feed {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .task-chip {
        padding: 8px 10px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
      }

      .filter-toolbar {
        align-items: center;
      }

      .text-field,
      .select-field,
      .scan-path-textarea {
        border: 1px solid rgba(111, 209, 255, 0.18);
        border-radius: 16px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
      }

      .text-field,
      .select-field {
        min-height: 48px;
        padding: 0 14px;
      }

      .text-field {
        min-width: 240px;
        flex: 1 1 260px;
      }

      .toggle-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 14px;
        min-height: 48px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
      }

      .settings-layout {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        gap: 18px;
      }

      .settings-group-nav,
      .settings-form-surface {
        align-content: start;
      }

      .settings-group-nav {
        display: grid;
        gap: 12px;
      }

      .settings-group-nav .nav-link {
        width: 100%;
      }

      .settings-form-grid {
        display: grid;
        gap: 16px;
        margin-top: 18px;
      }

      .field-stack {
        display: grid;
        gap: 8px;
      }

      .toggle-card {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 16px 18px;
        border: 1px solid rgba(111, 209, 255, 0.18);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
      }

      .toggle-card strong {
        display: block;
      }

      .settings-save-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-top: 20px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
      }

      .settings-diagnostics-block {
        display: grid;
        gap: 16px;
        margin-top: 20px;
        padding-top: 18px;
        border-top: 1px solid var(--border);
      }

      .diagnostics-summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 14px;
      }

      .diagnostics-log-panel {
        grid-column: 1 / -1;
      }

      .diagnostics-log-list {
        margin: 10px 0 0;
        padding-left: 20px;
        display: grid;
        gap: 6px;
      }

      .video-result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      .actor-result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      .video-result-card {
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 18px;
        border-radius: 22px;
        border: 1px solid rgba(111, 209, 255, 0.14);
        background: linear-gradient(180deg, rgba(13, 24, 39, 0.96), rgba(11, 19, 32, 0.82));
      }

      .video-result-card.has-gaps {
        border-color: rgba(255, 193, 94, 0.24);
      }

      .actor-result-card {
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 18px;
        border-radius: 22px;
        border: 1px solid rgba(111, 209, 255, 0.14);
        background: linear-gradient(180deg, rgba(13, 24, 39, 0.96), rgba(11, 19, 32, 0.82));
      }

      .actor-result-card.selected {
        border-color: rgba(111, 209, 255, 0.4);
        box-shadow: inset 0 0 0 1px rgba(111, 209, 255, 0.12);
      }

      .actor-result-head,
      .actor-detail-head {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .actor-avatar {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        width: 48px;
        height: 48px;
        border-radius: 16px;
        background: linear-gradient(135deg, rgba(34, 183, 255, 0.92), rgba(111, 209, 255, 0.28));
        color: #04111c;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .actor-avatar.large {
        width: 72px;
        height: 72px;
        border-radius: 22px;
        font-size: 24px;
      }

      .actor-avatar.placeholder {
        background: linear-gradient(135deg, rgba(255, 173, 94, 0.9), rgba(111, 209, 255, 0.34));
      }

      .actor-avatar-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: rgba(7, 16, 28, 0.9);
      }

      .actor-avatar-fallback {
        position: relative;
        z-index: 1;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .actor-result-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .video-result-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .video-result-title,
      .code-pill {
        font-weight: 700;
      }

      .video-result-title {
        font-size: 20px;
      }

      .actor-drawer-surface {
        align-content: start;
      }

      .actor-detail-copy {
        display: grid;
        gap: 10px;
      }

      .actor-detail-grid {
        margin-top: 20px;
      }

      .actor-library-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .actor-video-list {
        display: grid;
        gap: 14px;
        margin-top: 22px;
      }

      .video-result-card.compact {
        gap: 12px;
        padding: 16px;
      }

      .code-pill,
      .asset-badge,
      .actor-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
      }

      .asset-badge.ok {
        color: var(--success);
      }

      .asset-badge.missing {
        color: #ffd89a;
      }

      .video-result-meta,
      .detail-row {
        color: var(--text-muted);
      }

      .video-card-note {
        color: #cfe7ff;
        line-height: 1.65;
      }

      .detail-row {
        display: grid;
        gap: 6px;
        min-width: 220px;
      }

      .detail-row strong {
        color: var(--text);
      }

      .action-column {
        flex-direction: column;
      }

      .action-column .primary-button,
      .action-column .ghost-button {
        width: 100%;
      }

      .loading-shell,
      .fatal-shell {
        min-height: 60vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .eyebrow {
        display: inline-flex;
        padding: 7px 11px;
        border-radius: 999px;
        background: rgba(111, 209, 255, 0.14);
        color: #a9e8ff;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      @media (max-width: 1100px) {
        .app-shell {
          grid-template-columns: 1fr;
        }

        .shell-sidebar {
          border-right: none;
          border-bottom: 1px solid var(--border);
        }

        .metric-grid,
        .library-detail-grid,
        .danger-summary,
        .settings-layout {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .split-layout {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .shell-content,
        .shell-sidebar {
          padding: 22px 18px;
        }

        .metric-grid,
        .library-detail-grid,
        .danger-summary,
        .settings-layout {
          grid-template-columns: 1fr;
        }

        .content-header,
        .global-activity-bar,
        .global-activity-copy,
        .collection-summary-strip,
        .section-header,
        .modal-header,
        .library-card-head,
        .header-actions,
        .modal-actions {
          align-items: stretch;
          flex-direction: column;
        }

        .header-actions,
        .global-activity-actions,
        .modal-actions {
          width: 100%;
        }

        .header-actions .ghost-button,
        .global-activity-actions .ghost-button,
        .modal-actions .ghost-button,
        .modal-actions .danger-button,
        .modal-actions .primary-button,
        .task-card-actions .ghost-button,
        .task-card-actions .primary-button,
        .action-row .ghost-button,
        .action-row .primary-button {
          width: 100%;
        }

        .result-pagination,
        .pagination-actions {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="../dist/renderer/main.js"></script>
  </body>
</html>
